name: Update Quote

on:
  workflow_dispatch:  # Manually trigger the workflow
  schedule:
    - cron: '30 6 * * *'  # Schedule daily at 12:00 PM IST

permissions:
  contents: write  # Crucial for preventing authentication push crashes

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then echo '{"dependencies":{}}' > package.json; fi
          npm install

      - name: Update Quote
        run: node update-quote.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name "Divyanshu-sharma-coder"
          git config --global user.email "divyanshusharma20062515@gmail.com"
          
          git add README.md
          
          # Clean structural check to handle both changes or empty updates smoothly without breaking
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update README with daily quote"
            git push origin HEAD:main
          else
            echo "No changes found. Content matches exactly. Skipping commit."
          fi
