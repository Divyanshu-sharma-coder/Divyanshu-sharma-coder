name: Update Quote

on:
  workflow_dispatch:  # Manually trigger the workflow
  schedule:
    - cron: '30 6 * * *'  # Schedule daily at 12:00 PM IST (6:30 AM UTC)

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # FIX 1: Upgraded to v4 to eliminate Node deprecation errors

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'       # FIX 2: Upgraded from 14 to modern, supported LTS Node version

      - name: Install dependencies
        run: npm install

      - name: Update Quote
        run: node update-quote.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          # FIX 3: Configured with your exact username and automation metadata safely
          git config --global user.name "Divyanshu-sharma-coder"
          git config --global user.email "divyanshusharma20062515@gmail.com"
          git add README.md
          # Guard check: Only commit if files actually changed, preventing crash exit codes
          git diff-index --quiet HEAD || git commit -m "Update README with daily quote"
          git push
